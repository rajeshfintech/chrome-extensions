<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto Tab Closer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid #e8eaed;
      padding-bottom: 10px;
    }
    header img { width: 20px; height: 20px; }
    header h1 { font-size: 14px; font-weight: 600; flex: 1; }
    #idle-label { font-size: 11px; color: #5f6368; }

    #tabs-list { margin-bottom: 10px; max-height: 240px; overflow-y: auto; }

    .tab-item {
      padding: 7px 8px;
      margin: 4px 0;
      border-radius: 6px;
      background: #fff4ed;
      border: 1px solid #fed7aa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-info { flex: 1; min-width: 0; }
    .tab-site {
      font-weight: 600;
      font-size: 12px;
      color: #ea580c;
    }
    .tab-title {
      font-size: 11px;
      color: #5f6368;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-countdown {
      font-size: 11px;
      color: #9a3412;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .tab-countdown.urgent { color: #dc2626; font-weight: 600; }

    .cancel-btn {
      background: none;
      border: 1px solid #fed7aa;
      border-radius: 4px;
      cursor: pointer;
      color: #ea580c;
      font-size: 11px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cancel-btn:hover { background: #ffedd5; }

    .empty {
      color: #9aa0a6;
      padding: 8px 0;
      text-align: center;
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 6px;
    }
    button.primary {
      flex: 1;
      padding: 7px 10px;
      background: #ea580c;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button.primary:hover { background: #c2410c; }
    button.primary:disabled { background: #9aa0a6; cursor: default; }
    button.secondary {
      flex: 1;
      padding: 7px 10px;
      background: #f1f3f4;
      color: #202124;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button.secondary:hover { background: #e2e4e7; }

    #status { color: #5f6368; font-size: 11px; margin-top: 8px; text-align: center; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin: 12px 0 6px;
      border-top: 1px solid #e8eaed;
      padding-top: 10px;
    }
    #manual-list { max-height: 120px; overflow-y: auto; }
    .manual-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      margin: 3px 0;
      border-radius: 6px;
      background: #f8f9fa;
      border: 1px solid #e8eaed;
    }
    .manual-match {
      flex: 1;
      min-width: 0;
      font-size: 11px;
      color: #202124;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9aa0a6;
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #dc2626; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .add-row input {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12px;
    }
    .add-row input:focus { outline: none; border-color: #ea580c; }
    .add-row button {
      padding: 6px 10px;
      background: #ea580c;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
    }
    .add-row button:hover { background: #c2410c; }
    #addCurrentBtn {
      width: 100%;
      margin-top: 6px;
      padding: 6px 10px;
      background: #f1f3f4;
      color: #202124;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    #addCurrentBtn:hover { background: #e2e4e7; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="">
    <h1>Auto Tab Closer</h1>
    <span id="idle-label"></span>
  </header>

  <div id="tabs-list"><div class="empty">Loading…</div></div>

  <div class="actions">
    <button id="cancelAllBtn" class="primary">Cancel All</button>
    <button id="reloadBtn" class="secondary">Reload Config</button>
  </div>

  <div class="section-title">Watched links</div>
  <div id="manual-list"><div class="empty">No manual links</div></div>
  <div class="add-row">
    <input id="patternInput" type="text" placeholder="e.g. example.com/dashboard">
    <button id="addPatternBtn">Add</button>
  </div>
  <button id="addCurrentBtn">+ Watch current tab</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
